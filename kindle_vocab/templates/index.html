<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kindle Vocab → Anki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Kindle Vocab → Anki CSV</h1>
          <p class="text-muted">Upload your Kindle <code>vocab.db</code> to generate Anki flashcards with definitions and verb morphology.</p>
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              {% for msg in messages %}
                <div class="alert alert-warning">{{ msg }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          <form method="post" action="/upload" enctype="multipart/form-data">
            <div class="mb-3">
              <input type="file" name="vocabdb" class="form-control" accept=".db,.sqlite,.sqlite3">
            </div>
            <button type="submit" class="btn btn-primary">Upload & Process</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
