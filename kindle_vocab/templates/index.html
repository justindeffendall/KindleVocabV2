{% from "base.html" import head, header, flashes %}
<!doctype html>
<html lang="en">
<head>
  {{ head("Kindle Vocab") }}
</head>
<body>
<div class="container container--narrow">
  {{ header() }}
  <div class="card">
    <h1 class="page-title">Upload your vocabulary</h1>
    <p class="page-subtitle">
Select your Kindle's <a href="/help" style="background:var(--paper-dark);padding:0.1rem 0.35rem;border-radius:2px;font-size:0.88em;font-family:monospace;color:var(--ink);text-decoration:none;border-bottom:1px dashed var(--ink-faint);">vocab.db</a> to generate Anki-ready flashcards from your Spanish reading. Includes definitions, context sentences, and verb morphology.</p>
    {{ flashes() }}
    <form method="post" action="/upload" enctype="multipart/form-data">
      <input type="file" name="vocabdb" class="file-input" accept=".db,.sqlite,.sqlite3">
      <button type="submit" class="btn btn--primary">Upload</button>
    </form>
  </div>
</div>
</body>
</html>
