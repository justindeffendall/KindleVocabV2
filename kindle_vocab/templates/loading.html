<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Processing…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
          <h1 class="h4 mb-3">Processing…</h1>
          <div class="progress mb-3" style="height: 24px;">
            <div id="bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
          </div>
          <p id="msg" class="text-muted small">Starting…</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function poll() {
  fetch("/status/{{ job_id }}")
    .then(r => r.json())
    .then(d => {
      if (d.state === "done") {
        window.location = "/results/{{ job_id }}";
        return;
      }
      if (d.state === "error") {
        document.getElementById("msg").textContent = "Error: " + d.message;
        document.getElementById("bar").classList.add("bg-danger");
        return;
      }
      const pct = d.total > 0 ? Math.round(100 * d.current / d.total) : 0;
      document.getElementById("bar").style.width = pct + "%";
      document.getElementById("bar").textContent = pct + "%";
      document.getElementById("msg").textContent = d.message || "Working…";
      setTimeout(poll, 1000);
    })
    .catch(() => setTimeout(poll, 2000));
})();
</script>
</body>
</html>
