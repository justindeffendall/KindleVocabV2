{% from "base.html" import head, header %}
<!doctype html>
<html lang="en">
<head>{{ head("Processing") }}</head>
<body>
<div class="container container--narrow">
  {{ header() }}
  <div class="card" style="text-align:center;padding:3rem 2.5rem;">
    <h1 class="page-title" style="margin-bottom:0.5rem;">Processing</h1>
    <p id="msg" class="page-subtitle" style="margin-bottom:0;">Starting&hellip;</p>
    <div class="progress-track">
      <div id="bar" class="progress-fill" style="width:0%;"></div>
    </div>
    <p id="pct" style="font-size:0.8rem;color:var(--ink-3);letter-spacing:0.03em;">0%</p>
  </div>
</div>
<script>
(function poll() {
  fetch("/status/{{ job_id }}")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.state === "done") {
        window.location = "/results/{{ job_id }}";
        return;
      }
      if (d.state === "error") {
        document.getElementById("msg").textContent = "Error: " + d.message;
        document.getElementById("bar").style.background = "#7a2e2e";
        return;
      }
      var pct = d.total > 0 ? Math.round(100 * d.current / d.total) : 0;
      document.getElementById("bar").style.width = pct + "%";
      document.getElementById("pct").textContent = pct + "%";
      document.getElementById("msg").textContent = d.message || "Working\u2026";
      setTimeout(poll, 1000);
    })
    .catch(function() { setTimeout(poll, 2000); });
})();
</script>
</body>
</html>
