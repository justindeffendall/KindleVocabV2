{% from "base.html" import head, header %}
<!doctype html>
<html lang="en">
<head>
  {{ head("Processing") }}
</head>
<body>
<div class="container container--narrow">
  {{ header() }}
  <div class="card" style="text-align:center;">
    <h1 class="page-title">Processing your vocabulary</h1>
    <p id="msg" class="page-subtitle">Starting...</p>
    <div class="progress-track">
      <div id="bar" class="progress-fill" style="width:0%;">0%</div>
    </div>
  </div>
</div>
<script>
(function poll() {
  fetch("/status/{{ job_id }}")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.state === "done") {
        window.location = "/results/{{ job_id }}";
        return;
      }
      if (d.state === "error") {
        document.getElementById("msg").textContent = "Error: " + d.message;
        document.getElementById("bar").style.background = "#8b3a3a";
        return;
      }
      var pct = d.total > 0 ? Math.round(100 * d.current / d.total) : 0;
      document.getElementById("bar").style.width = pct + "%";
      document.getElementById("bar").textContent = pct + "%";
      document.getElementById("msg").textContent = d.message || "Working...";
      setTimeout(poll, 1000);
    })
    .catch(function() { setTimeout(poll, 2000); });
})();
</script>
</body>
</html>
